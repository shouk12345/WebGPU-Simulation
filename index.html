<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Fluid Simulation</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        color : crosshair;
      }
      
      /*webGPUのサポートがない場合のスタイル*/
      #unsupported {
        display: none;
        position: fixed;
        inset: 0;
        background: #0d0f14;
        color : #e2e8f4;
        font-family: 'segoe UI', system-ui, sans-serif;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 2rem;
        text-align: center;
      }
      #unsupported h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #f87171;
      }
      #unsupported p {
        font-size: 14px;
        color: #7b8499;
        max-width: 420px;
        line-height: 1.7;
      }

      #unsupported a {
        color: #60a5fa;
        text-decoration: none;
      }

      #unsupported a:hover {
        text-decoration: underline;
      }

      /*ヒントのスタイル*/
      #hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'segoe UI', system-ui, sans-serif;
        background: rgba(0, 0, 0, 0.0);
        color: rgba(255, 255, 255);
        pointer-events: none;
        transition: opacity 1.5s ease;
        white-space: nowrap;
        font-size: 20px;
      }

      #hint.hidden {
        opacity: 0;
      }

      #share-card {
        display: none;
        position: fixed;
        bottom: 8px;
        right: 8px;
        width: 245px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        font-family: 'lucida grande', arial, sans-serif;
        font-size: 11px;
        color: #eee;
        z-index: 9999;
      }
      #share-card.visible { display: block; }

      #share-card .sc-header {
        background: #000;
        padding: 4px 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      #share-card .sc-close {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        font-size: 14px;
        padding: 0;
        line-height: 1;
      }
      #share-card .sc-close:hover { color: #eee; }

      #share-card .sc-thumb {
        display: block;
        width: 100%;
        height: 80px;
        object-fit: cover;
        border-bottom: 1px solid #2a2a2a;
      }

      #share-card .sc-body { padding: 6px; }

      #share-card .sc-url {
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        padding: 4px 6px;
        font-size: 10px;
        color: #888;
        word-break: break-all;
        line-height: 1.5;
        margin-bottom: 6px;
      }

      #share-card .sc-btns {
        display: flex;
        gap: 4px;
        margin-bottom: 4px;
      }
      #share-card .sc-btns button {
        flex: 1;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #eee;
        font-size: 11px;
        font-family: 'lucida grande', arial, sans-serif;
        padding: 4px;
        cursor: pointer;
      }
      #share-card .sc-btns button:hover { background: #3a3a3a; }
      #share-card .sc-btns button:active { background: #444; }

      #share-card .sc-status {
        font-size: 10px;
        color: #4db84d;
        min-height: 14px;
        text-align: right;
      }
    </style>
</head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="unsupported">
      <h1>WebGPU is not supported</h1>
      <p>このブラウザはWebGPUに対応していません。<br>
      <strong>Google Chrome 113</strong>以降や、<strong>Microsoft Edge 113</strong>以降でWebGPUがサポートされています。<br>
      最新のブラウザにアップデートするか、WebGPUをサポートするブラウザを使用してください。<br><br>
        <a href="https://caniuse.com/webgpu" target="_blank" rel="noopener">
          WebGPU 対応状況を確認する →
        </a>
      </p>
    </div>

    <div id="hint">drag and click to paint</div>

    <!-- ② Share Card HTML -->
    <div id="share-card">
      <div class="sc-header">
        <span>snapshot</span>
        <button class="sc-close" onclick="hideShareCard()">×</button>
      </div>
      <img id="share-thumb" class="sc-thumb" src="" alt="snapshot preview">
      <div class="sc-body">
        <div class="sc-url" id="share-url-display"></div>
        <div class="sc-btns">
          <button onclick="copyShareUrl()">copy url</button>
          <button onclick="openShareUrl()">open</button>
        </div>
        <div class="sc-status" id="share-status"></div>
      </div>
    </div>

    <!-- dat.GUI: シミュレーターと独立してロード -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>

    <!-- ③ Share Card JS -->
    <script>
      let _shareUrl = '';

      function showShareCard(thumbDataUrl, shareUrl) {
        _shareUrl = shareUrl;
        document.getElementById('share-thumb').src = thumbDataUrl;
        document.getElementById('share-url-display').textContent = shareUrl;
        document.getElementById('share-status').textContent = '';
        document.getElementById('share-card').classList.add('visible');
      }

      function hideShareCard() {
        document.getElementById('share-card').classList.remove('visible');
      }

      function copyShareUrl() {
        navigator.clipboard.writeText(_shareUrl).then(() => {
          document.getElementById('share-status').textContent = 'copied.';
          setTimeout(() => document.getElementById('share-status').textContent = '', 2000);
        });
      }

    function openShareUrl() {
      window.open(_shareUrl, '_blank');
    }
  </script>
    <script type="module">
      // webGPUがサポートされているか確認
      if (!navigator.gpu) {
        document.getElementById('canvas').style.display = 'none';
        document.getElementById('unsupported').style.display = 'flex';
      } else {
        const {run2DFluidDemo} = await import('./demo/2dFluid/2DFluidDemo.ts');
        const canvas = document.getElementById('canvas');
        await run2DFluidDemo(canvas, 256, 256);

        // ヒントのフェードアウト
        const hint = document.getElementById('hint');
        setTimeout(() => {
          hint.classList.add('hidden');
        }, 3000);

        // スクリーンショットUI
        const ui = {
          status : 'waiting',
          shareUrl : '',
          capture : () =>{
            ui.status = 'capturing';
            gui.updateDisplay();

            // rAFでレンダリング後にキャプチャ
            requestAnimationFrame(()=>{
              const thumbDataUrl = canvas.toDataURL('image/png');
              canvas.toBlob(async (blob) =>{
                try {
                  ui.status = 'updating';
                  gui.updateDisplay();

                  const API = 'https://i3htjemnb1.execute-api.ap-northeast-1.amazonaws.com/presign';

                  const {uploadURL: uploadUrl, shareURL: shareUrl} = 
                    await fetch(API).then(r=>r.json());

                  await fetch(uploadUrl, {
                    method : 'PUT',
                    body : blob,
                    headers : {'Content-Type': 'image/png'},
                  });

                  showShareCard(thumbDataUrl,shareUrl);

                  ui.shareUrl = shareUrl;
                  ui.status = 'complete';
                  gui.updateDisplay();
                } catch(e){
                  ui.status = 'error : ' + e.message;
                  gui.updateDisplay();
                }
              }, 'image/png');
            });
          },
        };

        const gui = new dat.GUI({width: 280});
        const f = gui.addFolder('snapshot');
        f.add(ui, 'capture').name('Share Screenshot');
        f.add(ui, 'status').name('Status').listen();
        f.open();
      }
    </script>
  </body>
</html>
